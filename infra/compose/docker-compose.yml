name: qlct-app

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-root}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-qlct}
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - qlct-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-redis}
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - qlct-net

  server:
    container_name: server
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3001}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-root}@mongodb:27017/${MONGO_DB_NAME:-qlct}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
    env_file:
      - ../../apps/server/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qlct-net

  client:
    container_name: client
    build:
      context: ../..
      dockerfile: apps/client/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
    env_file:
      - ../../apps/client/.env
    depends_on:
      - server
    networks:
      - qlct-net

networks:
  qlct-net:
    driver: bridge

volumes:
  mongodb-data:
  mongodb-config:
  redis-data:

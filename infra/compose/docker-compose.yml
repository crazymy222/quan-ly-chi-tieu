name: qlct-app

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    hostname: mongodb
    restart: unless-stopped
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all" ]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet mongodb://127.0.0.1:27017/admin --eval "try { rs.status(); } catch (e) { rs.initiate({ _id: ''rs0'', members: [{ _id: 0, host: ''mongodb:27017'' }] }); } if (db.adminCommand({ ping: 1 }).ok !== 1) quit(1);"',
        ]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - qlct-net

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-redis}
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - qlct-net

  server:
    container_name: server
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3001}
      MONGO_URI: mongodb://mongodb:27017/${MONGO_DB_NAME:-qlct}?replicaSet=rs0
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
    env_file:
      - ../../apps/server/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - qlct-net

  client:
    container_name: client
    build:
      context: ../..
      dockerfile: apps/client/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
    env_file:
      - ../../apps/client/.env
    depends_on:
      - server
    networks:
      - qlct-net

networks:
  qlct-net:
    driver: bridge

volumes:
  mongodb-data:
  mongodb-config:
  redis-data:
